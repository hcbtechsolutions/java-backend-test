      #     ${{ secrets.USERNAME }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.USERNAME }}/deploy/dev

      - name: 📦 Copy files to server by SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: "parking-lots-management/eureka-discovery-service/k8s/eureka-discovery-service.yaml"
          target: /home/${{ secrets.USERNAME }}/deploy/dev

      - name: Deploy on DEV Cluster
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            export KUBECONFIG=${{ secrets.KUBECONFIG_DEV_CONTENT }}
            kubectl config use-context microk8s
            kubectl apply -f /home/${{ secrets.USERNAME }}/deploy/dev/eureka-discovery-service.yaml

