apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-discovery-service
  labels:
    app: eureka-discovery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-discovery-service
  template:
    metadata:
      labels:
        app: eureka-discovery-service
    spec:
      containers:
        - name: eureka
          image: hcbtechsolutions/eureka-discovery-service:latest
          ports:
            - containerPort: 8761
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: 8761
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-discovery-service
  labels:
    app: eureka-discovery-service
spec:
  selector:
    app: eureka-discovery-service
  ports:
    - name: http
      port: 8761
      targetPort: 8761
  type: ClusterIP
